<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#162d62">
    <meta
      name="description"
      content="Yeti, a fluffy white cursor cat, plays with Monty the black dog in a maths-themed world."
    >
    <title>Mathkari Pets — Yeti &amp; Monty</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2248%22 fill=%22%23162d62%22/><circle cx=%2250%22 cy=%2250%22 r=%2222%22 fill=%22%23ebac33%22/></svg>">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
  </head>
  <body>
    <h1 class="sr-only">Yeti the white cat and Monty the black dog</h1>
    <p class="sr-only">
      Move your pointer to guide Yeti. Monty gets happy when Yeti comes near him.
    </p>

    <header class="pet-note">
      <div class="pet-note-title"><span class="paw-mark" aria-hidden="true"><i></i><i></i><i></i><i></i></span>Mathkari Pets</div>
      <p>Bring your pet to the maths centre so it can be added.</p>
    </header>

    <svg class="maths-world" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      <defs>
        <pattern id="small-grid" width="36" height="36" patternUnits="userSpaceOnUse">
          <path d="M36 0H0V36" fill="none" stroke="#f5c85a" stroke-opacity=".075" stroke-width="1" />
        </pattern>
        <pattern id="large-grid" width="180" height="180" patternUnits="userSpaceOnUse">
          <rect width="180" height="180" fill="url(#small-grid)" />
          <path d="M180 0H0V180" fill="none" stroke="#f5c85a" stroke-opacity=".12" stroke-width="2" />
        </pattern>
        <linearGradient id="gold-glow" x1="0" y1="0" x2="1" y2="1">
          <stop stop-color="#f5c85a" />
          <stop offset="1" stop-color="#ebac33" />
        </linearGradient>
      </defs>

      <rect width="1440" height="900" fill="#162d62" />
      <rect width="1440" height="900" fill="url(#large-grid)" />
      <circle cx="1240" cy="100" r="315" fill="url(#gold-glow)" opacity=".95" />
      <circle cx="-45" cy="855" r="330" fill="#ebac33" opacity=".92" />

      <g class="math-lines" fill="none" stroke="#f5c85a" stroke-linecap="round" stroke-linejoin="round">
        <path d="M115 225h305M267 72v305" />
        <path d="m405 225-18-10v20zM267 87l-10 18h20z" fill="#f5c85a" stroke="none" />
        <path d="M78 334c76-196 150-196 226 0s150 196 226 0" />
        <path d="m885 160 160 245H725z" />
        <path d="M782 318h57v-57" />
        <circle cx="1120" cy="560" r="172" />
        <circle cx="1120" cy="560" r="96" />
        <path d="M948 560h344M1120 388v344" />
        <path d="M994 443c92 33 167 108 213 230" stroke-dasharray="9 16" />
      </g>

      <g class="math-dots" fill="#ebac33">
        <circle cx="146" cy="180" r="8" /><circle cx="204" cy="180" r="8" /><circle cx="262" cy="180" r="8" />
        <circle cx="146" cy="238" r="8" /><circle cx="204" cy="238" r="8" /><circle cx="262" cy="238" r="8" />
        <circle cx="146" cy="296" r="8" /><circle cx="204" cy="296" r="8" /><circle cx="262" cy="296" r="8" />
        <circle cx="595" cy="130" r="11" /><circle cx="655" cy="130" r="6" /><circle cx="715" cy="130" r="11" />
      </g>

      <g class="floating-shapes">
        <path d="M594 710h180v-180z" fill="none" stroke="#ebac33" stroke-width="7" />
        <rect x="545" y="480" width="108" height="108" rx="20" fill="#ebac33" opacity=".12" transform="rotate(16 599 534)" />
        <circle cx="870" cy="700" r="44" fill="#f5c85a" opacity=".16" />
        <path d="M400 590c70-70 140-70 210 0" fill="none" stroke="#f5c85a" stroke-width="5" stroke-dasharray="3 15" stroke-linecap="round" />
      </g>
    </svg>

    <div class="grain" aria-hidden="true"></div>
    <div class="click-spark" aria-hidden="true"><i></i><i></i><i></i><i></i></div>

    <div class="cursor-cat" aria-hidden="true">
      <div class="cat-facing">
        <svg class="cat-art" viewBox="0 0 150 132" role="presentation">
          <g class="cat-tail">
            <path d="M111 99c27 8 38-8 27-25-6-9-16-6-17 2" fill="none" stroke="#162d62" stroke-linecap="round" stroke-width="13" />
            <path d="M135 76c-4-4-8-4-11-1" fill="none" stroke="#fffdf8" stroke-linecap="round" stroke-width="8" />
            <path d="M118 85c6 3 11 2 15-1" fill="none" stroke="#d9e4f8" stroke-linecap="round" stroke-width="4" />
          </g>

          <ellipse cx="76" cy="125" rx="44" ry="6" fill="#0f1f47" opacity=".24" />

          <path d="m40 48-10 5 8 6-7 7 10 3-4 9 11-1 4-29zM109 48l11 5-8 6 7 7-10 3 4 9-11-1-4-29z" fill="#fffdf8" stroke="#162d62" stroke-linejoin="round" stroke-width="4" />
          <path d="M38 57c0-22 15-33 37-33s38 11 38 33S98 92 75 92 38 78 38 57Z" fill="#fffdf8" stroke="#162d62" stroke-width="5" />
          <path d="m66 27 5-8 5 7 6-7 4 10" fill="#fffdf8" stroke="#162d62" stroke-linejoin="round" stroke-width="4" />
          <path d="M69 31c-3 7-2 14 0 19M83 31c3 7 2 14 0 19" fill="none" stroke="#e1e9f7" stroke-linecap="round" stroke-width="6" />

          <ellipse cx="60" cy="57" rx="10" ry="11" fill="white" stroke="#162d62" stroke-width="3" />
          <ellipse cx="91" cy="57" rx="10" ry="11" fill="white" stroke="#162d62" stroke-width="3" />
          <g class="cat-pupils">
            <circle cx="61" cy="59" r="4.5" fill="#162d62" /><circle cx="92" cy="59" r="4.5" fill="#162d62" />
            <circle cx="59.5" cy="57" r="1.2" fill="white" /><circle cx="90.5" cy="57" r="1.2" fill="white" />
          </g>

          <path d="m70 70 6 4 6-4c0-4-12-4-12 0Z" fill="#d98fa2" stroke="#162d62" stroke-linejoin="round" stroke-width="2" />
          <path d="M76 74v4c-4 5-10 3-10 0m10 0c4 5 10 3 10 0" fill="none" stroke="#162d62" stroke-linecap="round" stroke-width="2.5" />
          <path d="M52 70 25 65m27 12-29 4m79-11 27-5m-27 12 28 5" fill="none" stroke="#162d62" stroke-linecap="round" stroke-width="2.5" />
          <path d="M56 91c11 6 27 6 38 0" fill="none" stroke="#ebac33" stroke-width="5" />
          <circle cx="75" cy="95" r="9" fill="#ebac33" />
          <circle cx="75" cy="95" r="3" fill="#162d62" />
        </svg>
      </div>
    </div>

    <div class="monty" aria-hidden="true" data-happy="false">
      <div class="monty-glow"></div>
      <div class="monty-hearts"><i></i><i></i><i></i></div>
      <svg class="dog-art" viewBox="0 0 190 160" role="presentation">
        <ellipse cx="102" cy="150" rx="62" ry="7" fill="#0f1f47" opacity=".22" />
        <g class="dog-tail">
          <path d="M46 111C15 105 13 72 33 68c14-3 20 12 11 20" fill="none" stroke="#090c13" stroke-linecap="round" stroke-width="16" />
          <path d="M31 70c6-2 11 1 14 6" fill="none" stroke="#31394b" stroke-linecap="round" stroke-width="5" />
        </g>

        <g class="dog-body">
          <path d="M54 92c-9 13-11 35-5 55h91c7-25-3-48-22-57z" fill="#090c13" stroke="#162d62" stroke-linejoin="round" stroke-width="5" />
          <path d="M70 118v30M122 118v30" stroke="#31394b" stroke-linecap="round" stroke-width="13" />
          <path d="M67 147h19M116 147h19" stroke="#090c13" stroke-linecap="round" stroke-width="10" />
          <path d="M79 100c10 5 24 5 34 0" fill="none" stroke="#ebac33" stroke-width="6" />
          <circle cx="96" cy="105" r="9" fill="#ebac33" />

          <g class="dog-head">
            <path class="dog-ear dog-ear-left" d="M57 40C39 22 34 53 45 75l20-8z" fill="#090c13" stroke="#162d62" stroke-linejoin="round" stroke-width="5" />
            <path class="dog-ear dog-ear-right" d="M132 40c18-18 23 13 12 35l-20-8z" fill="#090c13" stroke="#162d62" stroke-linejoin="round" stroke-width="5" />
            <path d="M49 67c0-28 18-43 47-43s47 15 47 43-18 44-47 44-47-16-47-44Z" fill="#090c13" stroke="#162d62" stroke-width="5" />
            <path d="M59 39c10-10 23-15 37-15s27 5 37 15c-9 3-14 10-17 18-12-7-28-7-40 0-3-8-8-15-17-18Z" fill="#31394b" />

            <ellipse cx="77" cy="65" rx="11" ry="13" fill="white" />
            <ellipse cx="116" cy="65" rx="11" ry="13" fill="white" />
            <g class="dog-pupils"><circle cx="79" cy="68" r="5" fill="#162d62" /><circle cx="114" cy="68" r="5" fill="#162d62" /></g>

            <ellipse cx="96" cy="84" rx="25" ry="19" fill="#e8ddd0" />
            <path d="M88 78c0-7 16-7 16 0-1 6-15 6-16 0Z" fill="#090c13" />
            <path class="dog-smile" d="M96 84c0 9-15 9-16 1m16-1c0 9 15 9 16 1" fill="none" stroke="#090c13" stroke-linecap="round" stroke-width="3" />
            <path class="dog-tongue" d="M88 92h16v8c0 12-16 12-16 0Z" fill="#e77587" stroke="#090c13" stroke-linejoin="round" stroke-width="3" />

      </svg>
    </div>
  </body>
</html>
